<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c3468"/>
      <stop offset="40%" stop-color="#414494"/>
      <stop offset="100%" stop-color="#08102a"/>
    </linearGradient>
    <radialGradient id="aurora1" cx="0.3" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#7fecc1" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#7fecc1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="0.7" cy="0.6" r="0.6">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#aurora1)" filter="url(#blur)"/>
  <rect width="600" height="800" fill="url(#aurora2)" filter="url(#blur)"/>

  <!-- subtle stars -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="80" cy="120" r="1.2"/>
    <circle cx="500" cy="80" r="0.8"/>
    <circle cx="120" cy="640" r="1"/>
    <circle cx="540" cy="700" r="1.4"/>
    <circle cx="300" cy="40" r="0.9"/>
    <circle cx="450" cy="500" r="1.1"/>
    <circle cx="60" cy="380" r="0.8"/>
    <circle cx="480" cy="240" r="1"/>
  </g>

  <!-- initials -->
  <text x="300" y="430" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="220" font-weight="800" fill="#ffffff" opacity="0.95">SS</text>
  <text x="300" y="510" text-anchor="middle" font-family="ui-monospace, monospace" font-size="22" letter-spacing="6" fill="#7fecc1" opacity="0.9">SARIKA SHIROLKAR</text>
  <text x="300" y="560" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" letter-spacing="4" fill="#b6c4e8" opacity="0.7">REPLACE WITH YOUR HEADSHOT</text>
</svg>
